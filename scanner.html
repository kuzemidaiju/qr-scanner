<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入退室スキャナー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  #videoWrap {
    position: relative;
    width: 100%;
    max-width: 400px;
  }
  video {
    width: 100%;
    border-radius: 12px;
    display: block;
  }
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border: 3px solid #4ade80;
    border-radius: 12px;
    pointer-events: none;
  }
  #status {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #status.success { color: #4ade80; font-weight: bold; font-size: 22px; }
  #status.error { color: #f87171; }
  #status.waiting { color: #aaa; }
  .btns { display: flex; gap: 10px; margin-top: 16px; }
  button {
    padding: 10px 24px;
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  canvas { display: none; }
</style>
</head>
<body>
<h1>入退室スキャナー</h1>
<div id="videoWrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
</div>
<canvas id="canvas"></canvas>
<div id="status" class="waiting">QRコードをかざしてください</div>


<script>
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var statusEl = document.getElementById('status');
  var stream = null;
  var scanning = true;
  var facingMode = 'user';
  var jsQRLoaded = false;

  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
  script.onload = function() {
    jsQRLoaded = true;
    statusEl.textContent = 'QRコードをかざしてください';
  };
  script.onerror = function() {
    statusEl.textContent = 'ライブラリ読み込みエラー。再読み込みしてください。';
    statusEl.className = 'error';
  };
  document.head.appendChild(script);

  function startCamera() {
    if (stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
    }
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode }
    }).then(function(s) {
      stream = s;
      video.srcObject = s;
      video.play();
      requestAnimationFrame(scan);
    }).catch(function(err) {
      statusEl.textContent = 'カメラのアクセスを許可してください: ' + err.message;
      statusEl.className = 'error';
    });
  }

  function switchCamera() {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    scanning = true;
    statusEl.textContent = 'カメラ切替中...';
    statusEl.className = 'waiting';
    startCamera();
  }

  function scan() {
    if (!jsQRLoaded) {
      requestAnimationFrame(scan);
      return;
    }
    if (!scanning) {
      requestAnimationFrame(scan);
      return;
    }
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code && code.data) {
        var url = code.data;
        if (url.indexOf('formResponse') !== -1) {
          scanning = false;
          sendForm(url);
        }
      }
    }
    requestAnimationFrame(scan);
  }

  function sendForm(url) {
    statusEl.textContent = '送信中...';
    statusEl.className = 'waiting';
    fetch(url, { method: 'GET', mode: 'no-cors' })
      .then(function() {
        var match = url.match(/entry\.[0-9]+=([^&]+)/);
        var name = match ? decodeURIComponent(match[1]) : '';
        statusEl.innerHTML = name + '<br>✅ 記録しました！';
        statusEl.className = 'success';
        setTimeout(function() {
          scanning = true;
          statusEl.textContent = 'QRコードをかざしてください';
          statusEl.className = 'waiting';
        }, 2000);
      })
      .catch(function() {
        statusEl.textContent = 'エラー。もう一度試してください';
        statusEl.className = 'error';
        setTimeout(function() {
          scanning = true;
          statusEl.textContent = 'QRコードをかざしてください';
          statusEl.className = 'waiting';
        }, 2000);
      });
  }

  startCamera();
</script>
</body>
</html>
